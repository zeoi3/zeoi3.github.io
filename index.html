<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Breeze's Apps</title>
    <style>
        :root {
            --bg-color: #f5f5f7;
            --card-bg: #ffffff;
            --text-main: #1d1d1f;
            --text-secondary: #86868b;
            --accent: #0071e3;
            --accent-hover: #0077ed;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            color: var(--text-main);
            -webkit-font-smoothing: antialiased;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 60px 20px;
        }

        .header {
            text-align: center;
            margin-bottom: 60px;
        }

        .header h1 {
            font-size: 2.5rem;
            font-weight: 700;
            margin: 0 0 12px 0;
            letter-spacing: -0.015em;
        }

        .header p {
            font-size: 1.2rem;
            color: var(--text-secondary);
            margin: 0;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 24px;
        }

        .card {
            background: var(--card-bg);
            border-radius: 24px;
            padding: 32px 24px;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.04);
            transition: transform 0.3s cubic-bezier(0.2, 0.8, 0.2, 1), box-shadow 0.3s ease;
        }

        .card:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 32px rgba(0, 0, 0, 0.08);
        }

        .icon-wrapper {
            position: relative;
            width: 88px;
            height: 88px;
            margin-bottom: 20px;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.08);
            border-radius: 22px;
            background-color: #f0f0f0;
        }

        .icon-wrapper::after {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 22px;
            border: 1px solid rgba(0, 0, 0, 0.08); /* 略微加深一点点确保各个屏幕可见，完美还原内边框 */
            pointer-events: none; /* 防止遮挡点击 */
        }

        .icon {
            width: 100%;
            height: 100%;
            border-radius: 22px;
            object-fit: cover;
            display: block;
        }

        .title {
            font-size: 1.3rem;
            font-weight: 600;
            margin: 0 0 8px 0;
        }

        .desc {
            font-size: 0.95rem;
            color: var(--text-secondary);
            line-height: 1.5;
            flex-grow: 1;
            margin: 0 0 24px 0;
        }

        .download-btn {
            background: var(--accent);
            color: #fff;
            text-decoration: none;
            padding: 12px 24px;
            border-radius: 24px;
            font-size: 0.95rem;
            font-weight: 500;
            transition: background 0.2s, transform 0.1s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
        }

        .download-btn:hover {
            background: var(--accent-hover);
        }

        .download-btn:active {
            transform: scale(0.96);
        }

        .download-btn svg {
            width: 18px;
            height: 18px;
        }

    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>App Collection</h1>
            <p>小巧、专注、提升效率的独立应用</p>
        </div>

        <div class="grid">
            <!-- 锁定输入法 -->
            <div class="card">
                <div class="icon-wrapper">
                    <img src="assets/inputLock.png" alt="锁定输入法" class="icon">
                </div>
                <h2 class="title">锁定输入法</h2>
                <p class="desc">这是一个专注于锁定输入法的小工具，让你的输入体验不再被打断。</p>
                <a id="link-inputLock" href="https://github.com/zeoi3/inputLock-updates/releases/download/v1.2/inputLock-1.2.zip" class="download-btn">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
                    下载 Mac 版
                </a>
            </div>

            <!-- OneDock AI -->
            <div class="card">
                <div class="icon-wrapper">
                    <img src="assets/onedockLogo.png" alt="OneDock AI" class="icon">
                </div>
                <h2 class="title">OneDock AI</h2>
                <p class="desc">把常用 AI 网站收进一个 APP，增加对话目录功能，集中管理你的 AI 助手。</p>
                <a id="link-onedockAI" href="https://github.com/zeoi3/onedockAI-releases/releases/download/v1.0.10/OneDock-AI.zip" class="download-btn">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
                    下载 Mac 版
                </a>
            </div>

            <!-- FocusPixels -->
            <div class="card">
                <div class="icon-wrapper">
                    <img src="assets/FocusPixels.png" alt="FocusPixels" class="icon">
                </div>
                <h2 class="title">FocusPixels</h2>
                <p class="desc">可视化每日专注时长，用长期趋势看见自己的点滴成长与进步。</p>
                <a id="link-PixLog" href="https://github.com/zeoi3/FocusPixels-Releases/releases/download/v0.0.23/FocusPixels-v0.0.23.zip" class="download-btn">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
                    下载 Mac 版
                </a>
            </div>
        </div>
    </div>
</body>
</html>
